<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00f2fe; margin-bottom: 5px; }
        #score-board { font-size: 1.5rem; margin-bottom: 15px; color: #e94560; }
        
        /* The game board canvas */
        canvas {
            background-color: #16213e;
            border: 4px solid #0f3460;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            display: block;
            margin: 0 auto;
        }
        
        .btn {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn:hover { background-color: #ff527b; }
    </style>
</head>
<body>

    <h1>🐍 Retro Snake 🐍</h1>
    <div id="score-board">Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <br>
    <button class="btn" onclick="resetGame()">Restart Game</button>
    <p style="color: #888;">Use the Arrow Keys to move!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize; // 20x20 grid

        let snake = [{x: 10, y: 10}]; // Start in the middle
        let apple = {x: 5, y: 5};
        let dx = 1;  // Horizontal speed (starts moving right)
        let dy = 0;  // Vertical speed
        let score = 0;
        let gameInterval;

        // Start the game loop
        function startGame() {
            gameInterval = setInterval(update, 100); // Updates every 100 milliseconds
        }

        function update() {
            // 1. Move the snake head forward
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 2. Check for Wall Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 3. Check for Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            // Add new head to the front of the snake
            snake.unshift(head);

            // 4. Check if Snake ate the Apple
            if (head.x === apple.x && head.y === apple.y) {
                score += 10;
                document.getElementById("score").innerText = score;
                spawnApple();
            } else {
                // Remove the tail element if it didn't eat an apple (keeps length the same)
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Clear the canvas for the new frame
            ctx.fillStyle = "#16213e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            ctx.fillStyle = "#00f2fe";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // Draw Apple
            ctx.fillStyle = "#e94560";
            ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function spawnApple() {
            apple.x = Math.floor(Math.random() * tileCount);
            apple.y = Math.floor(Math.random() * tileCount);
            
            // Make sure apple doesn't spawn on top of the snake
            snake.forEach(part => {
                if (part.x === apple.x && part.y === apple.y) {
                    spawnApple();
                }
            });
        }

        // Handle Arrow Key Controls
        window.addEventListener("keydown", e => {
            switch(e.key) {
                case "ArrowUp":
                    if (dy !== 1) { dx = 0; dy = -1; } // Prevent moving backward into yourself
                    break;
                case "ArrowDown":
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case "ArrowLeft":
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case "ArrowRight":
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        function gameOver() {
            clearInterval(gameInterval);
            alert("Game Over! Your final score was: " + score);
            resetGame();
        }

        function resetGame() {
            clearInterval(gameInterval);
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            document.getElementById("score").innerText = score;
            spawnApple();
            startGame();
        }

        // Fire up the game on page load
        startGame();
    </script>
</body>
</html>
