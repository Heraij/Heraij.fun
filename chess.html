<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Tactics Chess Puzzles</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #00f2fe; margin-bottom: 5px; }
        #status { font-size: 1.2rem; color: #e94560; margin-bottom: 20px; min-height: 1.5em; }
        #rating { color: #888; margin-bottom: 15px; font-weight: bold; }

        /* --- THE BOARD CONTAINER --- */
        .board-container {
            display: inline-block;
            background-color: #0f3460;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            box-sizing: border-box;
            transition: background-color 0.15s;
        }

        /* Dark Theme Square Matrix Styles */
        .light { background-color: #e2e4e6; }
        .dark { background-color: #889cac; }

        /* Highlight classes for selecting pieces */
        .square.selected {
            background-color: #00f2fe !important;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Pure Text Piece Color Overlays */
        .piece {
            display: block;
            line-height: 45px;
            height: 45px;
        }
        .piece.w { color: #ffffff; filter: drop-shadow(0px 0px 2px #000); }
        .piece.b { color: #1a1a2e; }

        .btn {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 25px;
        }
        .btn:hover { background-color: #ff527b; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        .home-btn {
            background-color: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 40px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .home-btn:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <h1>♟️ Cyber-Tactics ♟️</h1>
    <div id="rating">Puzzle Rating: 1650</div>
    <div id="status">Loading fresh puzzle grid...</div>

    <div class="board-container">
        <div class="board" id="chess-board"></div>
    </div>

    <br>
    <button class="btn" id="next-btn" onclick="loadLocalPuzzle()">Next Puzzle</button>
    <button class="home-btn" onclick="window.location.href='index.html'">Back to Arcade</button>

    <script>
        let game = new Chess();
        let puzzleSolutions = [];
        let currentMoveIndex = 0;
        let playerColor = 'w';
        let selectedSquare = null;

        // Hardcoded, curated Grandmaster Tactics database
       // Hardcoded, curated Grandmaster Tactics database
        const localPuzzleDatabase = [
            {
                rating: 1420,
                title: "Back Rank Checkmate",
                fen: "6k1/5ppp/8/8/8/8/4QPPP/6K1 w - - 0 1",
                lines: ["e2e8"]
            },
            {
                rating: 1550,
                title: "The Royal Fork",
                fen: "r3k2r/ppp2ppp/2n5/1B1p4/3P2P1/4q3/PPPNb2P/R2QK2R w KQkq - 0 1",
                lines: ["d1e2", "e3e2", "k1e2"] 
            },
            {
                rating: 1480,
                title: "Free Hanging Piece",
                fen: "r1bqk2r/pppp1ppp/2n2n2/4p3/1bB1P3/2NP1N2/PPP2PPP/R1BQK2R b KQkq - 0 4",
                lines: ["b4c3", "b2c3"]
            },
            {
                rating: 1610,
                title: "Smothered Knight Threat",
                fen: "r1bqkb1r/pppp1ppp/2n2n2/4p3/4P3/2N2N2/PPPP1PPP/R1BQKB1R w KQkq - 4 4",
                lines: ["f3e5", "c6e5", "d2d4"]
            },
            {
                rating: 1520,
                title: "Queen Skewer",
                fen: "4k3/8/8/8/8/8/3q4/3K1R2 w - - 0 1",
                lines: ["d1d2"]
            },
            {
                rating: 1680,
                title: "Anastasias Mate Pattern",
                fen: "m6k/5ppp/8/8/8/8/5PPP/6K1 w - - 0 1",
                fen: "5rk1/5ppp/8/8/8/8/4QPPP/5RK1 w - - 0 1",
                lines: ["e2e7"]
            },
            {
                rating: 1730,
                title: "Deflection Tactics",
                fen: "2r3k1/5ppp/8/8/8/8/3QPPPP/2R3K1 w - - 0 1",
                lines: ["c1c8"]
            },
            {
                rating: 1590,
                title: "Absolute Pin Win",
                fen: "4k3/4r3/8/8/8/4R3/4Q3/4K3 w - - 0 1",
                lines: ["e3e7", "e8f8", "e7e8"]
            }
        ];

        let currentPuzzleIndex = 0;

        const unicodePieces = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♟', 'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚'
        };

        function drawBoard() {
            const boardElement = document.getElementById("chess-board");
            boardElement.innerHTML = "";

            let isWhite = (playerColor === 'w');
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    let actualRow = isWhite ? row : 7 - row;
                    let actualCol = isWhite ? col : 7 - col;
                    
                    let files = ['a','b','c','d','e','f','g','h'];
                    let ranks = ['8','7','6','5','4','3','2','1'];
                    let squareName = files[actualCol] + ranks[actualRow];

                    let piece = game.get(squareName);

                    let squareDiv = document.createElement("div");
                    squareDiv.className = `square ${(actualRow + actualCol) % 2 === 0 ? 'light' : 'dark'}`;
                    squareDiv.id = squareName;
                    
                    if (selectedSquare === squareName) {
                        squareDiv.classList.add("selected");
                    }

                    if (piece) {
                        let pieceSpan = document.createElement("span");
                        pieceSpan.className = `piece ${piece.color}`;
                        pieceSpan.innerText = unicodePieces[piece.type];
                        squareDiv.appendChild(pieceSpan);
                    }

                    squareDiv.onclick = () => handleSquareClick(squareName);
                    boardElement.appendChild(squareDiv);
                }
            }
        }

        function handleSquareClick(squareName) {
            if (currentMoveIndex >= puzzleSolutions.length) return;

            let piece = game.get(squareName);

            if (selectedSquare === null) {
                if (piece && piece.color === playerColor) {
                    selectedSquare = squareName;
                    drawBoard();
                }
            } else {
                let source = selectedSquare;
                let target = squareName;
                selectedSquare = null; 

                let move = game.move({
                    from: source,
                    to: target,
                    promotion: 'q'
                });

                if (move === null) {
                    if (piece && piece.color === playerColor) {
                        selectedSquare = squareName;
                    }
                    drawBoard();
                    return;
                }

                let moveUci = source + target;
                
                if (moveUci === puzzleSolutions[currentMoveIndex]) {
                    currentMoveIndex++;
                    drawBoard();

                    if (currentMoveIndex < puzzleSolutions.length) {
                        document.getElementById('status').innerText = "Correct! Mainframe defending...";
                        setTimeout(makeComputerMove, 600);
                    } else {
                        document.getElementById('status').innerText = "🎉 Puzzle Solved! Matrix Overridden.";
                        document.getElementById('next-btn').disabled = false;
                    }
                } else {
                    document.getElementById('status').innerText = "❌ Incorrect Line! Reverting grid...";
                    setTimeout(() => {
                        game.undo();
                        drawBoard();
                    }, 600);
                }
            }
        }

        function makeComputerMove() {
            if (currentMoveIndex >= puzzleSolutions.length) return;

            let compMove = puzzleSolutions[currentMoveIndex];
            let from = compMove.substring(0, 2);
            let to = compMove.substring(2, 4);

            game.move({ from: from, to: to, promotion: 'q' });
            currentMoveIndex++;
            
            drawBoard();
            document.getElementById('status').innerText = "Your turn. Find the best continuation!";
        }

        function loadLocalPuzzle() {
            selectedSquare = null;
            
            // Cycle through our puzzle data bank smoothly
            let currentPuzzle = localPuzzleDatabase[currentPuzzleIndex];
            currentPuzzleIndex = (currentPuzzleIndex + 1) % localPuzzleDatabase.length;

            document.getElementById('rating').innerText = `Puzzle Rating: ${currentPuzzle.rating}`;
            document.getElementById('status').innerText = "Analyzing custom matrix layout...";

            game = new Chess();
            game.load(currentPuzzle.fen);
            
            puzzleSolutions = currentPuzzle.lines;
            currentMoveIndex = 0;
            
            // Set user to move
            playerColor = game.turn();

            drawBoard();
            
            // If the puzzle starts with an active opponent line, run it, otherwise wait for player
            if(puzzleSolutions.length > 1 && playerColor !== game.turn()) {
                document.getElementById('status').innerText = "Opponent is making their setup move...";
                setTimeout(makeComputerMove, 800);
            } else {
                document.getElementById('status').innerText = "Your turn. Find the tactical win!";
            }
        }

        window.onload = loadLocalPuzzle;
    </script>
</body>
</html>
