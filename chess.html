<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Tactics Chess Puzzles</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #00f2fe; margin-bottom: 5px; }
        #status { font-size: 1.2rem; color: #e94560; margin-bottom: 20px; min-height: 1.5em; }
        #rating { color: #888; margin-bottom: 15px; font-weight: bold; }

        /* --- THE BOARD CONTAINER --- */
        .board-container {
            display: inline-block;
            background-color: #0f3460;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            box-sizing: border-box;
            transition: background-color 0.15s;
        }

        /* Dark Theme Square Matrix Styles */
        .light { background-color: #e2e4e6; }
        .dark { background-color: #889cac; }

        /* Highlight classes for selecting pieces */
        .square.selected {
            background-color: #00f2fe !important;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Pure Text Piece Color Overlays */
        .piece {
            display: block;
            line-height: 45px;
            height: 45px;
        }
        .piece.w { color: #ffffff; filter: drop-shadow(0px 0px 2px #000); }
        .piece.b { color: #1a1a2e; }

        .btn {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 25px;
        }
        .btn:hover { background-color: #ff527b; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        .home-btn {
            background-color: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 40px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .home-btn:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <h1>♟️ Cyber-Tactics ♟️</h1>
    <div id="rating">Puzzle Rating: Loading...</div>
    <div id="status">Loading fresh puzzle grid...</div>

    <div class="board-container">
        <div class="board" id="chess-board"></div>
    </div>

    <br>
    <button class="btn" id="next-btn" onclick="fetchPuzzle()" disabled>Next Puzzle</button>
    <button class="home-btn" onclick="window.location.href='index.html'">Back to Arcade</button>

    <script>
        let game = new Chess();
        let puzzleSolutions = [];
        let currentMoveIndex = 0;
        let playerColor = 'w';
        let selectedSquare = null;

        // Map characters to standard Unicode Text symbols
        const unicodePieces = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♟', 'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚'
        };

        // Renders the board view manually from chess.js matrix data
        function drawBoard() {
            const boardElement = document.getElementById("chess-board");
            boardElement.innerHTML = "";

            // Flip rendering perspective automatically depending on if playing black or white side
            let isWhite = (playerColor === 'w');
            
            // Loop through the 8x8 matrix grid
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    let actualRow = isWhite ? row : 7 - row;
                    let actualCol = isWhite ? col : 7 - col;
                    
                    // Generate correct standard board coordinates
                    let files = ['a','b','c','d','e','f','g','h'];
                    let ranks = ['8','7','6','5','4','3','2','1'];
                    let squareName = files[actualCol] + ranks[actualRow];

                    let piece = game.get(squareName);

                    let squareDiv = document.createElement("div");
                    squareDiv.className = `square ${(actualRow + actualCol) % 2 === 0 ? 'light' : 'dark'}`;
                    squareDiv.id = squareName;
                    
                    if (selectedSquare === squareName) {
                        squareDiv.classList.add("selected");
                    }

                    if (piece) {
                        let pieceSpan = document.createElement("span");
                        pieceSpan.className = `piece ${piece.color}`;
                        pieceSpan.innerText = unicodePieces[piece.type];
                        squareDiv.appendChild(pieceSpan);
                    }

                    squareDiv.onclick = () => handleSquareClick(squareName);
                    boardElement.appendChild(squareDiv);
                }
            }
        }

        function handleSquareClick(squareName) {
            if (currentMoveIndex >= puzzleSolutions.length) return;

            let piece = game.get(squareName);

            // 1. Selecting a piece
            if (selectedSquare === null) {
                if (piece && piece.color === playerColor) {
                    selectedSquare = squareName;
                    drawBoard();
                }
            } 
            // 2. Clicking a target square to execute a move
            else {
                let source = selectedSquare;
                let target = squareName;
                selectedSquare = null; // Clear active state selection immediately

                let move = game.move({
                    from: source,
                    to: target,
                    promotion: 'q'
                });

                if (move === null) {
                    // Clicking another valid player piece switches selection instead of failing
                    if (piece && piece.color === playerColor) {
                        selectedSquare = squareName;
                    }
                    drawBoard();
                    return;
                }

                // Verify move against solution sequence array target
                let moveUci = source + target;
                if (moveUci === puzzleSolutions[currentMoveIndex] || 
                    (move.promotion && (source + target + 'q') === puzzleSolutions[currentMoveIndex])) {
                    
                    currentMoveIndex++;
                    drawBoard();

                    if (currentMoveIndex < puzzleSolutions.length) {
                        document.getElementById('status').innerText = "Correct! Mainframe defending...";
                        setTimeout(makeComputerMove, 600);
                    } else {
                        document.getElementById('status').innerText = "🎉 Puzzle Solved! Matrix Overridden.";
                        document.getElementById('next-btn').disabled = false;
                    }
                } else {
                    document.getElementById('status').innerText = "❌ Incorrect Line! Reverting grid...";
                    setTimeout(() => {
                        game.undo();
                        drawBoard();
                    }, 600);
                }
            }
        }

        function makeComputerMove() {
            let compMove = puzzleSolutions[currentMoveIndex];
            let from = compMove.substring(0, 2);
            let to = compMove.substring(2, 4);

            game.move({ from: from, to: to, promotion: 'q' });
            currentMoveIndex++;
            
            drawBoard();
            document.getElementById('status').innerText = "Your turn. Find the best continuation!";
        }

        async function fetchPuzzle() {
            document.getElementById('next-btn').disabled = true;
            document.getElementById('status').innerText = "Querying Lichess database...";
            selectedSquare = null;

            try {
                const response = await fetch('https://lichess.org/api/puzzle/next');
                const data = await response.json();

                const fen = data.game.fen;
                puzzleSolutions = data.puzzle.lines;
                currentMoveIndex = 0;
                
                document.getElementById('rating').innerText = `Puzzle Rating: ${data.puzzle.rating}`;
                
                // Initialize the game instance with the exact FEN puzzle layout positions
                game = new Chess(fen);
                playerColor = game.turn(); 

                // Draw the unique mid-game position state
                drawBoard();
                document.getElementById('status').innerText = "Opponent just played. Counter it!";
                
                // Fire the initial setup move
                setTimeout(makeComputerMove, 600);

            } catch (error) {
                document.getElementById('status').innerText = "Failed to sync matrix. Are you online?";
                document.getElementById('next-btn').disabled = false;
            }
        }

        window.onload = fetchPuzzle;
    </script>
</body>
</html>
