<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Grid Tic-Tac-Toe</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00f2fe; margin-bottom: 5px; }
        #status { font-size: 1.2rem; color: #e94560; margin-bottom: 20px; min-height: 1.5em; }

        /* --- THE BOARD --- */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            justify-content: center;
            margin: 0 auto;
        }

        .cell {
            background-color: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .cell:hover:not(.taken) {
            background-color: #0f3460;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        /* Distinct styling for X and O */
        .cell.X { color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }
        .cell.O { color: #e94560; text-shadow: 0 0 10px #e94560; }
        .cell.taken { cursor: not-allowed; }

        .btn {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 25px;
        }
        .btn:hover { background-color: #ff527b; }

        .home-btn {
            background-color: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 40px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .home-btn:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <h1>❌ Cyber-Grid XO ⭕</h1>
    <div id="status">Your turn (X)</div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(this, 0)"></div>
        <div class="cell" onclick="makeMove(this, 1)"></div>
        <div class="cell" onclick="makeMove(this, 2)"></div>
        <div class="cell" onclick="makeMove(this, 3)"></div>
        <div class="cell" onclick="makeMove(this, 4)"></div>
        <div class="cell" onclick="makeMove(this, 5)"></div>
        <div class="cell" onclick="makeMove(this, 6)"></div>
        <div class="cell" onclick="makeMove(this, 7)"></div>
        <div class="cell" onclick="makeMove(this, 8)"></div>
    </div>

    <button class="btn" onclick="resetBoard()">Reset Grid</button>
    <button class="home-btn" onclick="window.location.href='index.html'">Back to Arcade</button>

    <script>
        let boardState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        const statusDisplay = document.getElementById("status");

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function makeMove(cell, index) {
            if (boardState[index] !== "" || !gameActive) return;

            // Player's move (X)
            executeMove(cell, index, "X");

            if (checkWin("X")) {
                statusDisplay.innerText = "🎉 You defeated the mainframe! (X Wins)";
                gameActive = false;
                return;
            }

            if (checkDraw()) {
                statusDisplay.innerText = "System Lock: It's a draw!";
                gameActive = false;
                return;
            }

            // AI's turn (O)
            gameActive = false; // Temporarily lock board during AI "thinking"
            statusDisplay.innerText = "Mainframe computing...";
            
            setTimeout(aiMove, 500); 
        }

        function executeMove(cell, index, player) {
            boardState[index] = player;
            cell.innerText = player;
            cell.classList.add(player, "taken");
        }

        function aiMove() {
            // Find all remaining empty spots
            let emptyIndices = [];
            boardState.forEach((val, idx) => {
                if (val === "") emptyIndices.push(idx);
            });

            if (emptyIndices.length > 0) {
                // Simple AI: Picks a random available square
                const randomIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                const cells = document.getElementsByClassName("cell");
                
                executeMove(cells[randomIndex], randomIndex, "O");

                if (checkWin("O")) {
                    statusDisplay.innerText = "🤖 Mainframe wins! Better luck next cycle.";
                    gameActive = false;
                    return;
                }

                if (checkDraw()) {
                    statusDisplay.innerText = "System Lock: It's a draw!";
                    gameActive = false;
                    return;
                }

                // Return control back to the player
                statusDisplay.innerText = "Your turn (X)";
                gameActive = true;
            }
        }

        function checkWin(player) {
            return winningConditions.some(condition => {
                return condition.every(index => boardState[index] === player);
            });
        }

        function checkDraw() {
            return boardState.every(cell => cell !== "");
        }

        function resetBoard() {
            boardState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusDisplay.innerText = "Your turn (X)";
            
            const cells = document.getElementsByClassName("cell");
            for (let cell of cells) {
                cell.innerText = "";
                cell.className = "cell"; // Wipes out 'X', 'O', and 'taken' classes
            }
        }
    </script>
</body>
</html>
