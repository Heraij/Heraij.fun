<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Grid Tic-Tac-Toe</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00f2fe; margin-bottom: 5px; }
        #status { font-size: 1.2rem; color: #e94560; margin-bottom: 20px; min-height: 1.5em; }

        /* --- DIFFICULTY SLIDER --- */
        .slider-container {
            margin: 0 auto 25px auto;
            max-width: 300px;
            background-color: #16213e;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #0f3460;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        #difficulty-name {
            color: #00f2fe;
            text-transform: uppercase;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #e94560;
            cursor: pointer;
        }

        /* --- THE BOARD --- */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            justify-content: center;
            margin: 0 auto;
        }

        .cell {
            background-color: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .cell:hover:not(.taken) {
            background-color: #0f3460;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .cell.X { color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }
        .cell.O { color: #e94560; text-shadow: 0 0 10px #e94560; }
        .cell.taken { cursor: not-allowed; }

        .btn {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 25px;
        }
        .btn:hover { background-color: #ff527b; }

        .home-btn {
            background-color: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 40px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .home-btn:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <h1>❌ Cyber-Grid XO ⭕</h1>
    <div id="status">Your turn (X)</div>

    <div class="slider-container">
        <div class="slider-label">
            <span>Mainframe Level:</span>
            <span id="difficulty-name">Easy</span>
        </div>
        <input type="range" id="diff-slider" min="1" max="3" value="1" oninput="changeDifficulty()">
    </div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(this, 0)"></div>
        <div class="cell" onclick="makeMove(this, 1)"></div>
        <div class="cell" onclick="makeMove(this, 2)"></div>
        <div class="cell" onclick="makeMove(this, 3)"></div>
        <div class="cell" onclick="makeMove(this, 4)"></div>
        <div class="cell" onclick="makeMove(this, 5)"></div>
        <div class="cell" onclick="makeMove(this, 6)"></div>
        <div class="cell" onclick="makeMove(this, 7)"></div>
        <div class="cell" onclick="makeMove(this, 8)"></div>
    </div>

    <button class="btn" onclick="resetBoard()">Reset Grid</button>
    <button class="home-btn" onclick="window.location.href='index.html'">Back to Arcade</button>

    <script>
        let boardState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        const statusDisplay = document.getElementById("status");
        const slider = document.getElementById("diff-slider");
        const diffName = document.getElementById("difficulty-name");

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        const labels = { 1: "Easy", 2: "Medium", 3: "Hard" };

        function changeDifficulty() {
            diffName.innerText = labels[slider.value];
            resetBoard(); // Reset game when difficulty adjusts to prevent cheating
        }

        function makeMove(cell, index) {
            if (boardState[index] !== "" || !gameActive) return;

            executeMove(cell, index, "X");

            if (checkWin("X")) {
                statusDisplay.innerText = "🎉 You defeated the mainframe! (X Wins)";
                gameActive = false;
                return;
            }

            if (checkDraw()) {
                statusDisplay.innerText = "System Lock: It's a draw!";
                gameActive = false;
                return;
            }

            gameActive = false; 
            statusDisplay.innerText = "Mainframe computing...";
            
            setTimeout(aiMove, 400); 
        }

        function executeMove(cell, index, player) {
            boardState[index] = player;
            cell.innerText = player;
            cell.classList.add(player, "taken");
        }

        function aiMove() {
            let currentDifficulty = parseInt(slider.value);
            let targetIndex = -1;

            // --- SMART STRATEGY SCANNING ---
            // 1. Can AI Win right now? (Checks on Hard and Medium)
            if (currentDifficulty >= 2) {
                targetIndex = findStrategicMove("O"); 
            }

            // 2. Does AI need to block the human player? (Checks on Hard, and 50% chance on Medium)
            if (targetIndex === -1 && currentDifficulty >= 2) {
                if (currentDifficulty === 3 || Math.random() < 0.5) {
                    targetIndex = findStrategicMove("X");
                }
            }

            // 3. Positional Strategy (Only on Hard)
            if (targetIndex === -1 && currentDifficulty === 3) {
                // Take the center if it's free
                if (boardState[4] === "") {
                    targetIndex = 4;
                } else {
                    // Try to claim a corner node
                    let corners = [0, 2, 6, 8].filter(idx => boardState[idx] === "");
                    if (corners.length > 0) {
                        targetIndex = corners[Math.floor(Math.random() * corners.length)];
                    }
                }
            }

            // 4. Default: Pick a completely random empty square (Easy fallback)
            if (targetIndex === -1) {
                let emptyIndices = [];
                boardState.forEach((val, idx) => { if (val === "") emptyIndices.push(idx); });
                if (emptyIndices.length > 0) {
                    targetIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                }
            }

            // Execute the decided move
            if (targetIndex !== -1) {
                const cells = document.getElementsByClassName("cell");
                executeMove(cells[targetIndex], targetIndex, "O");

                if (checkWin("O")) {
                    statusDisplay.innerText = "🤖 Mainframe wins! Better luck next cycle.";
                    gameActive = false;
                    return;
                }

                if (checkDraw()) {
                    statusDisplay.innerText = "System Lock: It's a draw!";
                    gameActive = false;
                    return;
                }

                statusDisplay.innerText = "Your turn (X)";
                gameActive = true;
            }
        }

        // Helper function that looks ahead for lines with 2 matching symbols and 1 blank spot
        function findStrategicMove(playerSymbol) {
            for (let condition of winningConditions) {
                let count = 0;
                let emptyIndex = -1;

                for (let index of condition) {
                    if (boardState[index] === playerSymbol) count++;
                    else if (boardState[index] === "") emptyIndex = index;
                }

                if (count === 2 && emptyIndex !== -1) {
                    return emptyIndex; // Return the index needed to secure or block a win
                }
            }
            return -1;
        }

        function checkWin(player) {
            return winningConditions.some(condition => {
                return condition.every(index => boardState[index] === player);
            });
        }

        function checkDraw() {
            return boardState.every(cell => cell !== "");
        }

        function resetBoard() {
            boardState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusDisplay.innerText = "Your turn (X)";
            
            const cells = document.getElementsByClassName("cell");
            for (let cell of cells) {
                cell.innerText = "";
                cell.className = "cell";
            }
        }
    </script>
</body>
</html>
